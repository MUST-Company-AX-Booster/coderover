# Phase 3A (Zero Trust): all backing-store ports are bound to 127.0.0.1
# only so they're reachable from the host (psql / redis-cli / Memgraph
# Lab in a browser tab) but NOT from the external network. The api
# container reaches them via per-service compose networks, not the
# published port. To bind on a different host (e.g. a remote dev box),
# explicitly override the port or ssh-tunnel — never re-expose to 0.0.0.0
# in a shared-network environment.
#
# Phase 3B (Zero Trust): each backing store sits on its own internal
# bridge network — `db-net` for postgres, `cache-net` for redis,
# `graph-net` for memgraph. The api joins ALL three (and the default
# bridge for external traffic to GitHub / LLM APIs). Net effect: a
# compromised postgres cannot reach redis or memgraph; a compromised
# redis cannot reach postgres or memgraph. Lateral movement between
# stores is blocked at the docker network layer.
#
# `internal: true` on each store-net additionally cuts the store off
# from external internet — postgres/redis/memgraph never need outbound
# traffic, so a compromised dep that landed inside one cannot phone
# home. The api stays on the default network for legitimate egress.
networks:
  default:
    driver: bridge
  db-net:
    driver: bridge
    internal: true
  cache-net:
    driver: bridge
    internal: true
  graph-net:
    driver: bridge
    internal: true

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: coderover
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Phase 5 (Zero Trust): bootstrap-roles.sh reads these on FIRST
      # init of a fresh pgdata volume to create the coderover_app +
      # coderover_migrate roles. Populated from the host's .env so
      # secrets aren't committed; the bootstrap SQL asserts both are
      # set (length >= 12) and aborts otherwise.
      CODEROVER_APP_PASSWORD: ${CODEROVER_APP_PASSWORD}
      CODEROVER_MIGRATE_PASSWORD: ${CODEROVER_MIGRATE_PASSWORD}
    ports:
      - '127.0.0.1:5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Postgres' official entrypoint runs every script in
      # /docker-entrypoint-initdb.d/ on first DB init (read: empty
      # pgdata volume). The .sh wrapper invokes psql -v with the
      # passwords from env; the .sql alongside it is the actual
      # CREATE ROLE / GRANT script.
      - ./sql/bootstrap-roles.sh:/docker-entrypoint-initdb.d/00-bootstrap-roles.sh:ro
      - ./sql/bootstrap-roles.sql:/docker-entrypoint-initdb.d/bootstrap-roles.sql:ro
    networks:
      - db-net

  redis:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:6380:6379'
    networks:
      - cache-net

  memgraph:
    image: memgraph/memgraph-mage:latest
    ports:
      - '127.0.0.1:7687:7687'
      - '127.0.0.1:7444:7444' # Memgraph Lab
    command: ["--log-level=TRACE"]
    networks:
      - graph-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3001}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEMGRAPH_URI: ${MEMGRAPH_URI:-bolt://memgraph:7687}
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    depends_on:
      - postgres
      - redis
      - memgraph
    networks:
      - default
      - db-net
      - cache-net
      - graph-net

volumes:
  pgdata:
