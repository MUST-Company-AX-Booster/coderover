name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api — build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coderover-api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: coderover-api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  frontend:
    name: frontend — build + lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coderover-frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: coderover-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --run
        env:
          CI: "true"

  mcp:
    name: mcp — build + typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/mcp/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  secrets-scan:
    name: secrets — trufflehog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
