# Dependabot configuration.
#
# Strategy:
#   - Weekly cadence (Monday morning, GMT+5) so updates batch instead of
#     drip-firing throughout the week.
#   - Patch + minor updates GROUPED into a single PR per ecosystem so a
#     normal week is at most ~7 PRs total (one per ecosystem) instead of
#     dozens of individual ones.
#   - ALL MAJOR BUMPS IGNORED. Major version updates require manual
#     review (compatibility, migration cost, Node version matrix, etc.)
#     and the cost of an auto-filed major-bump PR is almost always
#     higher than the value. They surface on the Dependabot
#     "available updates" page instead:
#       https://github.com/MUST-Company-AX-Booster/coderover/network/updates
#     Filing a major bump PR is a one-line manual action when ready.
#
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ── coderover-api (NestJS backend) ────────────────────────────
  - package-ecosystem: npm
    directory: /coderover-api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Karachi
    open-pull-requests-limit: 5
    groups:
      api-patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - area:api

  # ── coderover-frontend (React + Vite) ─────────────────────────
  - package-ecosystem: npm
    directory: /coderover-frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Karachi
    open-pull-requests-limit: 5
    groups:
      frontend-patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - area:frontend

  # ── packages/mcp (npm-published @coderover/mcp) ───────────────
  - package-ecosystem: npm
    directory: /packages/mcp
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Karachi
    open-pull-requests-limit: 5
    groups:
      mcp-patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - area:mcp

  # ── packages/mcp-integration (test harness) ───────────────────
  - package-ecosystem: npm
    directory: /packages/mcp-integration
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Karachi
    open-pull-requests-limit: 5
    groups:
      mcp-integration-patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - area:mcp

  # ── packages/mcp-offline (offline embedder) ───────────────────
  - package-ecosystem: npm
    directory: /packages/mcp-offline
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Karachi
    open-pull-requests-limit: 5
    groups:
      mcp-offline-patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - area:mcp

  # ── GitHub Actions workflows ──────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Karachi
    open-pull-requests-limit: 3
    groups:
      actions-patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - area:ci

  # ── Docker (coderover-api Dockerfile) ─────────────────────────
  - package-ecosystem: docker
    directory: /coderover-api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Karachi
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - area:docker
