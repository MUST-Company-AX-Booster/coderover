# Phase 3A (Zero Trust): all backing-store ports are bound to 127.0.0.1
# only so they're reachable from the host (psql / redis-cli / Memgraph
# Lab in a browser tab) but NOT from the external network. The api
# container reaches them via the internal compose network, not the
# published port. To bind on a different host (e.g. a remote dev box),
# explicitly override the port or ssh-tunnel — never re-expose to 0.0.0.0
# in a shared-network environment.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: coderover
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '127.0.0.1:5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:6380:6379'

  memgraph:
    image: memgraph/memgraph-mage:latest
    ports:
      - '127.0.0.1:7687:7687'
      - '127.0.0.1:7444:7444' # Memgraph Lab
    command: ["--log-level=TRACE"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3001}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEMGRAPH_URI: ${MEMGRAPH_URI:-bolt://memgraph:7687}
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    depends_on:
      - postgres
      - redis
      - memgraph

volumes:
  pgdata:
