<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="CodeRover architecture — repo to graph to agents to MCP to clients">
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#0A0A0A"/>
      <rect width="4" height="2" fill="rgba(0,0,0,0.35)"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(237,235,229,0.55)"/>
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9FE0B4"/>
    </marker>
    <style><![CDATA[
      .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
      .bone { fill: #EDEBE5; }
      .ink { fill: #D8D6CF; }
      .silver { fill: #8C8C87; }
      .green { fill: #9FE0B4; }
      .coral { fill: #E89D9D; }
      .eyebrow { letter-spacing: 0.18em; text-transform: uppercase; }
      .box { fill: #1A1A1A; stroke: rgba(237,235,229,0.22); }
      .box-active { fill: #1A1A1A; stroke: #9FE0B4; }
      .group { fill: none; stroke: rgba(237,235,229,0.10); stroke-dasharray: 3 3; }
    ]]></style>
  </defs>

  <rect width="1200" height="720" fill="#0A0A0A"/>
  <rect width="1200" height="720" fill="url(#scan)" opacity="0.55"/>

  <!-- top bar -->
  <line x1="0" y1="56" x2="1200" y2="56" stroke="rgba(237,235,229,0.10)"/>
  <text x="32" y="36" class="mono silver eyebrow" font-size="11">§ ARCHITECTURE — graph-first · multi-tenant · self-hostable</text>
  <text x="1168" y="36" text-anchor="end" class="mono silver eyebrow" font-size="11">DATA · INTELLIGENCE · DISTRIBUTION</text>

  <!-- column eyebrows -->
  <g class="mono silver eyebrow" font-size="11">
    <text x="120" y="92">§ INGEST</text>
    <text x="380" y="92">§ STORES</text>
    <text x="640" y="92">§ FLEET</text>
    <text x="900" y="92">§ DISTRIBUTION</text>
  </g>

  <!-- column 1: ingest -->
  <g transform="translate(60,108)">
    <rect class="box" x="0" y="0" width="200" height="60"/>
    <text x="100" y="28" text-anchor="middle" class="sans bone" font-size="14" font-weight="600">your repo</text>
    <text x="100" y="48" text-anchor="middle" class="mono silver" font-size="11">git · 16 languages</text>

    <rect class="box" x="0" y="84" width="200" height="60"/>
    <text x="100" y="112" text-anchor="middle" class="sans bone" font-size="14" font-weight="600">tree-sitter</text>
    <text x="100" y="132" text-anchor="middle" class="mono silver" font-size="11">ast extract · structural</text>

    <rect class="box" x="0" y="168" width="200" height="60"/>
    <text x="100" y="196" text-anchor="middle" class="sans bone" font-size="14" font-weight="600">embedder</text>
    <text x="100" y="216" text-anchor="middle" class="mono silver" font-size="11">openai · ollama · minilm</text>

    <rect class="box" x="0" y="252" width="200" height="60"/>
    <text x="100" y="280" text-anchor="middle" class="sans bone" font-size="14" font-weight="600">incremental ingest</text>
    <text x="100" y="300" text-anchor="middle" class="mono silver" font-size="11">hash-diff · rename-aware</text>

    <rect class="box" x="0" y="336" width="200" height="60"/>
    <text x="100" y="364" text-anchor="middle" class="sans bone" font-size="14" font-weight="600">watch daemon</text>
    <text x="100" y="384" text-anchor="middle" class="mono silver" font-size="11">.gitignore · 500ms debounce</text>
  </g>

  <!-- column 2: stores -->
  <g transform="translate(320,108)">
    <rect class="box-active" x="0" y="0" width="200" height="120"/>
    <text x="100" y="28" text-anchor="middle" class="mono silver eyebrow" font-size="11">§ CODE GRAPH</text>
    <text x="100" y="56" text-anchor="middle" class="sans bone" font-size="18" font-weight="600">memgraph</text>
    <text x="100" y="80" text-anchor="middle" class="mono ink" font-size="11">File · Symbol · Class</text>
    <text x="100" y="96" text-anchor="middle" class="mono ink" font-size="11">Method · Function</text>
    <text x="100" y="112" text-anchor="middle" class="mono silver" font-size="11">DEFINES · IMPORTS · CALLS</text>

    <rect class="box-active" x="0" y="144" width="200" height="120"/>
    <text x="100" y="172" text-anchor="middle" class="mono silver eyebrow" font-size="11">§ VECTOR STORE</text>
    <text x="100" y="200" text-anchor="middle" class="sans bone" font-size="18" font-weight="600">pgvector</text>
    <text x="100" y="224" text-anchor="middle" class="mono ink" font-size="11">code chunks · 1536d</text>
    <text x="100" y="240" text-anchor="middle" class="mono silver" font-size="11">semantic similarity</text>

    <rect class="box" x="0" y="288" width="200" height="60"/>
    <text x="100" y="316" text-anchor="middle" class="sans bone" font-size="14" font-weight="600">postgres + redis</text>
    <text x="100" y="336" text-anchor="middle" class="mono silver" font-size="11">tenants · jobs · cache</text>

    <!-- confidence tag legend -->
    <g class="mono" font-size="11" transform="translate(0,372)">
      <text class="silver eyebrow">§ EVERY EDGE TAGGED</text>
      <g transform="translate(0,18)">
        <circle cx="4" cy="4" r="3" class="green"/>
        <text x="14" y="8" class="ink">EXTRACTED</text>
        <text x="100" y="8" class="silver">ast-derived</text>
      </g>
      <g transform="translate(0,36)">
        <circle cx="4" cy="4" r="3" fill="none" stroke="#EDEBE5" stroke-width="1.5"/>
        <text x="14" y="8" class="ink">INFERRED(score)</text>
        <text x="120" y="8" class="silver">llm</text>
      </g>
      <g transform="translate(0,54)">
        <circle cx="4" cy="4" r="3" class="coral"/>
        <text x="14" y="8" class="ink">AMBIGUOUS</text>
        <text x="100" y="8" class="silver">no evidence</text>
      </g>
    </g>
  </g>

  <!-- column 3: fleet of agents -->
  <g transform="translate(580,108)">
    <rect class="box" x="0" y="0" width="200" height="56"/>
    <circle cx="14" cy="20" r="3" class="green"/>
    <text x="28" y="24" class="mono bone" font-size="13">[scout]</text>
    <text x="14" y="44" class="mono silver" font-size="11">PR review · graph-aware</text>

    <rect class="box" x="0" y="72" width="200" height="56"/>
    <circle cx="14" cy="92" r="3" class="green"/>
    <text x="28" y="96" class="mono bone" font-size="13">[tinker]</text>
    <text x="14" y="116" class="mono silver" font-size="11">refactor · proposes PRs</text>

    <rect class="box" x="0" y="144" width="200" height="56"/>
    <circle cx="14" cy="164" r="3" class="coral"/>
    <text x="28" y="168" class="mono bone" font-size="13">[sentinel]</text>
    <text x="14" y="188" class="mono silver" font-size="11">security · patrols</text>

    <rect class="box" x="0" y="216" width="200" height="56"/>
    <circle cx="14" cy="236" r="3" class="green"/>
    <text x="28" y="240" class="mono bone" font-size="13">[beacon]</text>
    <text x="14" y="260" class="mono silver" font-size="11">search · chat · citations</text>

    <rect class="box" x="0" y="288" width="200" height="56"/>
    <circle cx="14" cy="308" r="3" class="green"/>
    <text x="28" y="312" class="mono bone" font-size="13">[archive]</text>
    <text x="14" y="332" class="mono silver" font-size="11">decision memory</text>

    <text x="0" y="376" class="mono silver eyebrow" font-size="11">§ ORCHESTRATOR</text>
    <text x="0" y="396" class="mono ink" font-size="12">nestjs api · jwt · scopes</text>
    <text x="0" y="414" class="mono silver" font-size="11">multi-tenant · token caps</text>
  </g>

  <!-- column 4: distribution -->
  <g transform="translate(840,108)">
    <rect class="box-active" x="0" y="0" width="220" height="120"/>
    <text x="110" y="28" text-anchor="middle" class="mono silver eyebrow" font-size="11">§ MCP TOOL SURFACE</text>
    <text x="110" y="56" text-anchor="middle" class="sans bone" font-size="18" font-weight="600">@coderover/mcp</text>
    <text x="110" y="80" text-anchor="middle" class="mono ink" font-size="11">remote · proxy → API</text>
    <text x="110" y="96" text-anchor="middle" class="mono ink" font-size="11">offline · sqlite + minilm</text>
    <text x="110" y="112" text-anchor="middle" class="mono silver" font-size="11">7 tools · scoped tokens</text>

    <!-- 5 client cards -->
    <g class="mono" font-size="12">
      <g transform="translate(0,144)">
        <rect class="box" x="0" y="0" width="220" height="36"/>
        <circle cx="12" cy="18" r="3" class="green"/>
        <text x="22" y="22" class="bone">claude code</text>
        <text x="208" y="22" text-anchor="end" class="silver" font-size="10">native</text>
      </g>
      <g transform="translate(0,184)">
        <rect class="box" x="0" y="0" width="220" height="36"/>
        <circle cx="12" cy="18" r="3" class="green"/>
        <text x="22" y="22" class="bone">cursor</text>
        <text x="208" y="22" text-anchor="end" class="silver" font-size="10">mcp</text>
      </g>
      <g transform="translate(0,224)">
        <rect class="box" x="0" y="0" width="220" height="36"/>
        <circle cx="12" cy="18" r="3" class="green"/>
        <text x="22" y="22" class="bone">aider</text>
        <text x="208" y="22" text-anchor="end" class="silver" font-size="10">mcp</text>
      </g>
      <g transform="translate(0,264)">
        <rect class="box" x="0" y="0" width="220" height="36"/>
        <circle cx="12" cy="18" r="3" class="green"/>
        <text x="22" y="22" class="bone">codex</text>
        <text x="208" y="22" text-anchor="end" class="silver" font-size="10">mcp</text>
      </g>
      <g transform="translate(0,304)">
        <rect class="box" x="0" y="0" width="220" height="36"/>
        <circle cx="12" cy="18" r="3" class="green"/>
        <text x="22" y="22" class="bone">gemini cli</text>
        <text x="208" y="22" text-anchor="end" class="silver" font-size="10">mcp</text>
      </g>
      <g transform="translate(0,344)">
        <rect class="box" x="0" y="0" width="220" height="36"/>
        <circle cx="12" cy="18" r="3" class="green"/>
        <text x="22" y="22" class="bone">vs code ext + dashboard</text>
        <text x="208" y="22" text-anchor="end" class="silver" font-size="10">native</text>
      </g>
    </g>
  </g>

  <!-- horizontal arrows -->
  <g stroke="rgba(237,235,229,0.55)" fill="none" marker-end="url(#arrow)">
    <line x1="262" y1="138" x2="318" y2="138"/>
    <line x1="262" y1="222" x2="318" y2="222"/>
    <line x1="262" y1="282" x2="318" y2="282"/>
  </g>
  <g stroke="#9FE0B4" fill="none" marker-end="url(#arrow-active)" stroke-width="1.5">
    <line x1="522" y1="168" x2="578" y2="168"/>
    <line x1="522" y1="216" x2="578" y2="240"/>
    <line x1="780" y1="168" x2="838" y2="120"/>
  </g>
  <g stroke="rgba(237,235,229,0.55)" fill="none" marker-end="url(#arrow)">
    <line x1="780" y1="100" x2="838" y2="60"/>
    <line x1="780" y1="240" x2="838" y2="60"/>
  </g>

  <!-- bottom strip: ops + observability -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="rgba(237,235,229,0.10)"/>
  <g transform="translate(60,624)" class="mono" font-size="12">
    <text class="silver eyebrow" font-size="11">§ OBSERVABILITY</text>
    <text x="0" y="22" class="ink">opentelemetry · prometheus</text>
    <text x="0" y="40" class="silver" font-size="11">traces · metrics · spans</text>
  </g>
  <g transform="translate(320,624)" class="mono" font-size="12">
    <text class="silver eyebrow" font-size="11">§ TENANCY</text>
    <text x="0" y="22" class="ink">org-scoped jwt · scope gates</text>
    <text x="0" y="40" class="silver" font-size="11">monthly token caps · audit log</text>
  </g>
  <g transform="translate(580,624)" class="mono" font-size="12">
    <text class="silver eyebrow" font-size="11">§ DEPLOY</text>
    <text x="0" y="22" class="ink">docker compose · self-hosted</text>
    <text x="0" y="40" class="silver" font-size="11">nginx · let's encrypt · contabo</text>
  </g>
  <g transform="translate(840,624)" class="mono" font-size="12">
    <text class="silver eyebrow" font-size="11">§ STACK</text>
    <text x="0" y="22" class="ink">nestjs · react · vite</text>
    <text x="0" y="40" class="silver" font-size="11">apache-2.0 · pre-1.0</text>
  </g>
</svg>
