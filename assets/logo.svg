<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="CodeRover logo">
  <defs>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#0A0A0A"/>
      <rect width="6" height="3" fill="rgba(0,0,0,0.45)"/>
    </pattern>
    <style><![CDATA[
      .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
      .bone { fill: #EDEBE5; }
      .silver { fill: #8C8C87; }
      .green { fill: #9FE0B4; }
      .eyebrow { letter-spacing: 0.18em; text-transform: uppercase; }
    ]]></style>
  </defs>

  <!-- frame -->
  <rect width="512" height="512" fill="#0A0A0A"/>
  <rect width="512" height="512" fill="url(#scan)" opacity="0.55"/>
  <rect x="16" y="16" width="480" height="480" fill="none" stroke="rgba(237,235,229,0.22)"/>

  <!-- corner brackets -->
  <g stroke="#EDEBE5" stroke-width="2" fill="none">
    <polyline points="32,72 32,32 72,32"/>
    <polyline points="440,32 480,32 480,72"/>
    <polyline points="32,440 32,480 72,480"/>
    <polyline points="440,480 480,480 480,440"/>
  </g>

  <!-- top eyebrow -->
  <text x="256" y="80" text-anchor="middle" class="mono silver eyebrow" font-size="14">§ CODEROVER</text>

  <!-- mark: stylized rover terminal (echo of favicon, scaled up) -->
  <g transform="translate(112,140)">
    <!-- outer terminal body -->
    <rect x="0" y="0" width="288" height="200" fill="#1A1A1A" stroke="#EDEBE5" stroke-width="2"/>
    <!-- screen -->
    <rect x="20" y="20" width="248" height="140" fill="#050505" stroke="rgba(237,235,229,0.22)"/>
    <!-- two scan pixels (the rover's "eyes") -->
    <g>
      <!-- left diamond -->
      <polygon points="92,90 116,66 140,90 116,114" fill="#9FE0B4"/>
      <!-- right diamond -->
      <polygon points="172,90 196,66 220,90 196,114" fill="#9FE0B4"/>
    </g>
    <!-- terminal prompt line under screen -->
    <line x1="20" y1="178" x2="180" y2="178" stroke="rgba(237,235,229,0.22)"/>
    <line x1="200" y1="178" x2="268" y2="178" stroke="#9FE0B4"/>
    <!-- legs -->
    <rect x="60" y="200" width="20" height="24" fill="#1A1A1A" stroke="#EDEBE5" stroke-width="2"/>
    <rect x="208" y="200" width="20" height="24" fill="#1A1A1A" stroke="#EDEBE5" stroke-width="2"/>
  </g>

  <!-- antenna / signal -->
  <g transform="translate(256,128)">
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#EDEBE5" stroke-width="2"/>
    <circle cx="0" cy="-26" r="5" fill="#9FE0B4"/>
  </g>

  <!-- wordmark -->
  <text x="256" y="408" text-anchor="middle" class="bone" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="600" letter-spacing="-1">CodeRover</text>

  <!-- bottom status -->
  <text x="256" y="448" text-anchor="middle" class="mono silver eyebrow" font-size="12">§ MISSION CONTROL · ONLINE</text>
</svg>
