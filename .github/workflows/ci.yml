name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api — build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coderover-api
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: coderover-api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  frontend:
    name: frontend — build + lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coderover-frontend
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: coderover-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --run
        env:
          CI: "true"

  mcp:
    name: mcp — build + typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/mcp/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  secrets-scan:
    name: secrets — trufflehog
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  dependency-review:
    name: deps — dependency review (PR diff)
    # Only meaningful on PRs — the action diffs base..head against the
    # GitHub Advisory Database and gates *newly introduced* vulnerable
    # deps. Existing vulnerabilities in main are surfaced separately by
    # Dependabot; this job stays out of their way and won't block PRs
    # whose only sin is touching files near a pre-existing vuln.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the job (and block merge once required) on any HIGH or
          # CRITICAL CVE introduced by this PR. Moderate is informational.
          fail-on-severity: high
          # Posts a summary comment on the PR when the gate fails so the
          # author sees the offending package + advisory inline.
          comment-summary-in-pr: on-failure
          # license-check intentionally OFF for now — adds noise without
          # an allow-list. Re-enable in a follow-up with `allow-licenses`
          # set to e.g. MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC.

  supply-chain-scan:
    name: supply-chain — polinrider
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Install all workspace deps WITHOUT running lifecycle scripts.
      # The static signature scan finds malicious code without executing it,
      # so we don't need to run a potentially-compromised postinstall to detect it.
      #
      # mcp-integration and mcp-offline don't ship a package-lock.json (they
      # aren't published from this repo's CI). Fall back to `npm install` so
      # their node_modules are still populated and scanned.
      - name: Install workspace deps (--ignore-scripts)
        run: |
          set -e
          for ws in coderover-api coderover-frontend packages/mcp packages/mcp-integration packages/mcp-offline; do
            echo "::group::install $ws"
            if [ -f "$ws/package-lock.json" ]; then
              (cd "$ws" && npm ci --ignore-scripts)
            else
              (cd "$ws" && npm install --ignore-scripts --no-audit --no-fund)
            fi
            echo "::endgroup::"
          done
      # PolinRider / Beavertail scan (DPRK Contagious Interview UNC5342):
      # known C2 IPs, malware string + regex signatures, config-file injections
      # (postcss/vite/eslint/etc.), known malware-installed npm packages.
      # Exits 1 on any finding, failing the job.
      - name: Scan for known npm supply-chain malware
        run: bash scripts/security/polinrider-scan.sh --dir .
